<script>const img = new Image(); img.src = '/faiscalog.png'; img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0); const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data; const colorCounts = {}; let maxCount = 0; let dominantColor = ''; for(let i=0; i<data.length; i+=4) { if(data[i+3] > 10) { /* round colors to nearest 10 to group similar */ const r = Math.round(data[i]/10)*10; const g = Math.round(data[i+1]/10)*10; const b = Math.round(data[i+2]/10)*10; const grayscale = r===g && g===b; if(!grayscale && r+g+b > 50 && r+g+b < 700) { const rgb = r+','+g+','+b; colorCounts[rgb] = (colorCounts[rgb] || 0) + 1; } } } const sorted = Object.entries(colorCounts).sort((a,b)=>b[1]-a[1]).slice(0,5); document.body.innerHTML = '<h1>Top colors: ' + JSON.stringify(sorted) + '</h1>'; };</script>
